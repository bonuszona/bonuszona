<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xoş Gəlmisiniz</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    z-index:10;
}

.btn{
    display:inline-block;
    padding:15px 30px;
    background:#ffcc00;
    color:#000;
    text-decoration:none;
    font-weight:bold;
    border-radius:10px;
}

.coin{
    position:absolute;
    top:-50px;
    font-size:30px;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-50px);
    }
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>
<body>

<div class="center">
    <h1>Hoş geldiniz</h1>
    <a class="btn" href="https://kfsi2upmb.com/oG2U">
        Hadi başlayalım
    </a>
</div>

<script>
for(let i=0;i<40;i++){
    let coin=document.createElement("div");
    coin.className="coin";
    coin.innerHTML="🪙";
    coin.style.left=Math.random()*100+"vw";
    coin.style.animationDuration=(3+Math.random()*5)+"s";
    document.body.appendChild(coin);
}
</script>

</body>
</html>
